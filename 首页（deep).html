<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经纬医馆 · 中国古代中医馆文化展</title>
    <!-- 字体与图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8f3eb;
            color: #3e362e;
            line-height: 1.6;
        }
        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 4rem;
            background: rgba(248, 243, 235, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #d9c9b7;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #6b4f3c;
        }
        .nav-links {
            display: flex;
            gap: 3rem;
        }
        .nav-links a {
            text-decoration: none;
            color: #4d3e32;
            font-weight: 500;
            font-size: 1.1rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid transparent;
        }
        .nav-links a.active {
            border-bottom-color: #b1886b;
        }
        .nav-tools {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-tools i {
            font-size: 1.3rem;
            color: #6b4f3c;
            cursor: pointer;
        }
        /* 主视觉区 */
        .hero {
            height: 70vh;
            min-height: 500px;
            background: linear-gradient(145deg, #e3d6c8, #cfbeaa);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0 2rem 2rem 2rem;
            border-radius: 0 0 50px 50px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M20 30 Q 40 10 60 30 T 90 20" stroke="%236b4f3c" fill="none" stroke-width="0.5"/><circle cx="30" cy="60" r="8" fill="%236b4f3c" opacity="0.1"/><circle cx="70" cy="40" r="12" fill="%236b4f3c" opacity="0.1"/></svg>');
            background-size: cover;
            opacity: 0.2;
        }
        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 4rem;
            font-weight: 700;
            color: #2f241b;
            text-shadow: 2px 2px 8px rgba(255,255,240,0.8);
            margin-bottom: 1rem;
            z-index: 1;
        }
        .hero .sub {
            font-size: 2rem;
            color: #5f4a38;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            z-index: 1;
        }
        .hero .quote {
            font-size: 1.3rem;
            color: #4d3e32;
            border-top: 2px solid #b1886b;
            border-bottom: 2px solid #b1886b;
            display: inline-block;
            padding: 0.8rem 2rem;
            background: rgba(255,245,235,0.3);
            z-index: 1;
        }
        /* 快速探索入口三卡片 */
        .quick-entry {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: -3rem 2rem 4rem 2rem;
            position: relative;
            z-index: 10;
        }
        .quick-card {
            background: #fffcf5;
            border-radius: 30px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            flex: 0 1 300px;
            text-align: center;
            border: 1px solid #e5d5c5;
        }
        .quick-card h3 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #5f3f2c;
        }
        .quick-card .subtitle {
            font-size: 0.9rem;
            color: #8f7b67;
            margin-bottom: 1.5rem;
        }
        .preview-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .preview-item {
            background: #e8d9cb;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            color: #4d3e32;
            border: 1px solid #b1886b;
            white-space: nowrap;
        }
        .preview-icon {
            font-size: 0.8rem;
            color: #b1886b;
            margin-right: 0.3rem;
        }
        /* 底部信息条 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e3d6c8;
            padding: 1rem 4rem;
            border-top: 2px solid #b1886b;
            border-bottom: 2px solid #b1886b;
            margin: 0 2rem 2rem;
            font-size: 1rem;
            color: #3e2e22;
        }
        .info-item i {
            margin-right: 0.5rem;
            color: #b1886b;
        }
        /* 页脚 */
        .footer {
            padding: 2rem 4rem;
            background: #3e362e;
            color: #ddd2c4;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">经纬医馆</div>
        <div class="nav-links">
            <a href="#" class="active">溯源·历代医馆</a>
            <a href="#">分脉·医筑谱系</a>
            <a href="#">匠心·营造名家</a>
            <a href="#">典藏·匠籍博览</a>
        </div>
        <div class="nav-tools">
            <i class="fas fa-robot" title="AI讲解问答"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </nav>

    <section class="hero">
        <h1>古馆藏医药，古建承文脉</h1>
        <div class="sub">—— 中国古代中医馆文化展 · 时空探访</div>
        <div class="quote">循时间之轴，探千年医事；观建筑之形，窥制度之变。</div>
    </section>

    <div class="quick-entry">
        <!-- 按时间轴 -->
        <div class="quick-card">
            <h3>按时间轴</h3>
            <div class="subtitle">穿越古今</div>
            <div class="preview-row">
                <span class="preview-item"><i class="fas fa-chevron-circle-right preview-icon"></i>周·礼制雏形</span>
                <span class="preview-item"><i class="fas fa-chevron-circle-right preview-icon"></i>唐·太医署复原</span>
                <span class="preview-item"><i class="fas fa-chevron-circle-right preview-icon"></i>宋·惠民药局</span>
            </div>
        </div>
        <!-- 按建筑类型 -->
        <div class="quick-card">
            <h3>按建筑类型</h3>
            <div class="subtitle">医馆剖面图</div>
            <div class="preview-row">
                <span class="preview-item"><i class="fas fa-building preview-icon"></i>官署</span>
                <span class="preview-item"><i class="fas fa-place-of-worship preview-icon"></i>寺院</span>
                <span class="preview-item"><i class="fas fa-store preview-icon"></i>药铺</span>
            </div>
        </div>
        <!-- 按人物/典籍 -->
        <div class="quick-card">
            <h3>按人物/典籍</h3>
            <div class="subtitle">名医面对面</div>
            <div class="preview-row">
                <span class="preview-item"><i class="fas fa-user-md preview-icon"></i>张仲景</span>
                <span class="preview-item"><i class="fas fa-user-md preview-icon"></i>李时珍</span>
                <span class="preview-item"><i class="fas fa-book preview-icon"></i>《新修》</span>
            </div>
        </div>
    </div>

    <div class="info-bar">
        <span class="info-item"><i class="fas fa-camera-retro"></i> 🏥 今日推荐：清代“同仁堂”老照片</span>
        <span class="info-item"><i class="fas fa-scroll"></i> 📜 典籍冷知识：宋朝已有“病历手历”</span>
    </div>

    <footer class="footer">
        <p>© 2025 经纬医馆 · 数据来源：国家古籍保护中心、故宫博物院及各博物馆 · 版权所有 请尊重版权</p>
    </footer>
</body>
</html>
